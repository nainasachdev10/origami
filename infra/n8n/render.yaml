services:
  - type: web
    name: origami-n8n
    env: node
    plan: free
    buildCommand: npm install -g n8n
    startCommand: n8n start
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: N8N_HOST
        fromService:
          type: web
          name: origami-n8n
          property: host
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: "https"
      - key: WEBHOOK_URL
        fromService:
          type: web
          name: origami-n8n
          property: url
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: origami-n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: origami-n8n-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: origami-n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: origami-n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: origami-n8n-db
          property: password
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_DEFAULT_CHAT_ID
        sync: false
      - key: OPENTWEET_API_KEY
        sync: false
      - key: OPENTWEET_BASE_URL
        value: "https://api.opentweet.io/v1"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TREND_RESEARCH_URL
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false

databases:
  - name: origami-n8n-db
    plan: free
    databaseName: n8n
    user: n8n
