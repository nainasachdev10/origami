services:
  - type: web
    name: origami-n8n
    env: node
    plan: free
    buildCommand: npm install -g n8n
    startCommand: n8n start
    envVars:
      # Pin Node 22 LTS. Render's default is the newest available, which breaks
      # n8n's native deps (isolated-vm fails to build against Node 26 V8 API).
      - key: NODE_VERSION
        value: "22.11.0"
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: N8N_HOST
        value: "0.0.0.0"
      - key: N8N_PORT
        value: "10000"
      - key: N8N_PROTOCOL
        value: "https"
      # Allow workflows to read env vars via {{ $env.X }} expressions.
      # n8n blocks this by default since 1.x; we configure all secrets via
      # service env vars (not per-credential UI) so this MUST be false.
      - key: N8N_BLOCK_ENV_ACCESS_IN_NODE
        value: "false"
      - key: WEBHOOK_URL
        sync: false
        # Set to https://origami-n8n.onrender.com after deploy (or your custom domain)
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: origami-n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: origami-n8n-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: origami-n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: origami-n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: origami-n8n-db
          property: password
      - key: GOOGLE_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_DEFAULT_CHAT_ID
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TREND_RESEARCH_URL
        sync: false
      # Optional - Reddit source skipped if not set
      - key: REDDIT_CLIENT_ID
        sync: false
      # Optional - Reddit source skipped if not set
      - key: REDDIT_CLIENT_SECRET
        sync: false

databases:
  - name: origami-n8n-db
    plan: free
    databaseName: n8n
    user: n8n
