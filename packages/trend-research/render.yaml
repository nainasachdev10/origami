services:
  - type: web
    name: origami-trend-research
    env: docker
    plan: free
    rootDir: packages/trend-research
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: NEWSAPI_KEY
        sync: false
